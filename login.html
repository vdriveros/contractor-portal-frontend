<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HORMETAL | Acceso a obra</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hormetal: {
              yellow: '#FFED00',
              black: '#000000',
              white: '#FFFFFF',
              graphite: '#121212',
              line: '#2A2A2A',
              soft: '#F5F5F5'
            }
          },
          fontFamily: {
            heading: ['Oswald', 'Arial Narrow', 'sans-serif'],
            body: ['Roboto', 'Arial', 'sans-serif']
          },
          boxShadow: {
            panel: '0 20px 60px rgba(0,0,0,.28)'
          }
        }
      }
    }
  </script>

  <link rel="icon" href="https://www.hormetal.com/wp-content/uploads/2025/02/favico-no-horme-150x150.png"
    sizes="32x32" />
  <link rel="icon" href="https://www.hormetal.com/wp-content/uploads/2025/02/favico-no-horme-300x300.png"
    sizes="192x192" />
  <link rel="apple-touch-icon" href="https://www.hormetal.com/wp-content/uploads/2025/02/favico-no-horme-300x300.png" />
  <meta name="msapplication-TileImage"
    content="https://www.hormetal.com/wp-content/uploads/2025/02/favico-no-horme-300x300.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">

  <style>
    .hormetal-cut {
      clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%, 0 12%);
    }

    .hormetal-cut-sm {
      clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 100%, 0 22%);
    }
  </style>
</head>

<body class="bg-hormetal-black text-hormetal-white font-body">
  <main
    class="relative flex min-h-screen items-center justify-center bg-[#070707] px-6 py-10 overflow-hidden sm:px-8 lg:px-12">
    <!-- Fondos base (manteniendo el fondo oscuro y sutiles brillos) -->
    <div
      class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(255,237,0,.12),transparent_35%),radial-gradient(circle_at_bottom_right,rgba(255,255,255,.05),transparent_30%)]">
    </div>
    <div class="absolute -left-20 top-10 h-72 w-72 rounded-full bg-hormetal-yellow/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-white/5 blur-3xl"></div>

    <div class="relative z-10 w-full max-w-[420px]">
      <div class="bg-white text-hormetal-black p-8 sm:p-10 shadow-panel">

        <!-- Logo Header -->
        <div class="mb-10 flex justify-center">
          <img src="./img/Hormetal_logo.png" alt="HORMETAL" class="h-12 w-auto sm:h-14" />
        </div>

        <div class="mb-6">

          <h2 class="mt-1 font-heading text-4xl uppercase leading-none text-black">
            PORTAL DE CLIENTES
          </h2>
          <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-black/40 pt-4">
            INICIAR SESIÓN
          </p>
        </div>

        <form class="space-y-5">
          <div>
            <label for="user" class="mb-2 block text-[11px] font-bold uppercase tracking-[0.15em] text-black/60">
              Usuario o correo
            </label>
            <input id="user" type="text" placeholder="cliente@empresa.com"
              class="w-full rounded-xl border border-black/10 bg-[#FAFAFA] px-4 py-3.5 text-sm text-black outline-none transition focus:border-hormetal-yellow focus:ring-4 focus:ring-hormetal-yellow/20" />
          </div>

          <div>
            <label for="password" class="mb-2 block text-[11px] font-bold uppercase tracking-[0.15em] text-black/60">
              Contraseña
            </label>
            <input id="password" type="password" placeholder="••••••••"
              class="w-full rounded-xl border border-black/10 bg-[#FAFAFA] px-4 py-3.5 text-sm text-black outline-none transition focus:border-hormetal-yellow focus:ring-4 focus:ring-hormetal-yellow/20" />
          </div>

          <label
            class="flex items-center gap-3 rounded-xl border border-black/10 bg-[#FAFAFA] px-4 py-3.5 text-sm text-black/70 cursor-pointer transition hover:bg-black/[0.02]">
            <input type="checkbox" class="h-4 w-4 rounded border-black/20 text-black focus:ring-hormetal-yellow">
            <span class="select-none">Mantener mi sesión iniciada</span>
          </label>

          <a href="dashboard.html"
            class="mt-8 flex w-full justify-center rounded-xl bg-hormetal-yellow px-5 py-4 font-heading text-lg font-bold uppercase tracking-wide text-black transition hover:-translate-y-0.5 hover:shadow-lg">
            Acceder al portal
          </a>

          <div class="mt-5">
            <a href="#" class="text-xs text-black/50 transition hover:text-black">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </form>
      </div>
    </div>

    <!-- Footer superpuesto opcional en la parte inferior si se requiere mantener los derechos -->
    <div
      class="absolute bottom-6 left-0 right-0 flex flex-col items-center justify-center space-y-1 text-center pointer-events-none">
      <p class="text-[10px] uppercase tracking-[0.15em] text-white/40">
        <span id="current-year"></span> © HORMETAL. TODOS LOS DERECHOS RESERVADOS.
      </p>
    </div>
  </main>

  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
